name: WeatherApp-iOS
options:
  bundleIdPrefix: dev.ividi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  WeatherApp-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WeatherApp-iOS
    info:
      path: WeatherApp-iOS/Info.plist
      properties:
        CFBundleDisplayName: WeatherApp
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ividi.weatherapp
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies: []

  WeatherApp-iOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WeatherApp-iOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ividi.weatherapp.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WeatherApp-iOS

  WeatherApp-iOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WeatherApp-iOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ividi.weatherapp.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WeatherApp-iOS
    dependencies:
      - target: WeatherApp-iOS

schemes:
  WeatherApp-iOS:
    build:
      targets:
        WeatherApp-iOS: all
        WeatherApp-iOSTests: [test]
        WeatherApp-iOSUITests: [test]
    test:
      targets:
        - WeatherApp-iOSTests
        - WeatherApp-iOSUITests
    run:
      config: Debug
